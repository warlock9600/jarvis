name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Test
    uses: ./.github/workflows/_lint.yml
  test:
    name: Lint and Test
    uses: ./.github/workflows/_test.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
     - lint
     - test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -buildvcs=false -trimpath -ldflags='-s -w' -o bin/jarvis ./cmd/jarvis

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jarvis-binary
          path: bin/jarvis
          if-no-files-found: error

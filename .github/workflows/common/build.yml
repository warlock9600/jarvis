name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs:
     - lint
     - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: 386

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT_DIR="dist/${GOOS}_${GOARCH}"
          BIN_NAME="jarvis"
          ARCHIVE_NAME="jarvis_${VERSION}_${GOOS}_${GOARCH}.tar.gz"

          mkdir -p "${OUT_DIR}"
          CGO_ENABLED=0 go build \
            -buildvcs=false \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "${OUT_DIR}/${BIN_NAME}" \
            ./cmd/jarvis

          tar -C "${OUT_DIR}" -czf "dist/${ARCHIVE_NAME}" "${BIN_NAME}"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz